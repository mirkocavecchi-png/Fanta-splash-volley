<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fanta Splash Volley</title>

https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap

<style>
body{
  font-family:'Nunito',sans-serif;
  background:linear-gradient(160deg,#03045e,#0077b6,#00b4d8);
  color:#fff;
  margin:0;
}
header{
  background:#03045e;
  padding:16px;
  text-align:center;
}
header h1{margin:0;font-weight:900}
main{
  max-width:1100px;
  margin:auto;
  padding:20px;
}
.section-title{
  font-size:1.5rem;
  font-weight:900;
  margin:30px 0 12px;
}
.btn{
  background:#ff6b6b;
  border:none;
  padding:10px 18px;
  border-radius:12px;
  color:#fff;
  font-weight:900;
  cursor:pointer;
}
.team{
  background:rgba(255,255,255,.14);
  backdrop-filter:blur(12px);
  border-radius:18px;
  padding:16px;
  margin-bottom:20px;
}
.team.winner{
  border:2px solid #ffd166;
  box-shadow:0 0 20px rgba(255,209,102,.8);
}
.media img,.media video{
  width:100%;
  max-height:220px;
  object-fit:cover;
  border-radius:14px;
  margin-top:8px;
}
.delete-btn{
  background:#c0392b;
  border:none;
  padding:6px 10px;
  border-radius:8px;
  color:#fff;
  font-size:.8rem;
  cursor:pointer;
  margin-top:6px;
}
.stars button{
  background:none;
  border:none;
  font-size:1.2rem;
  cursor:pointer;
}
.sound-box{margin-bottom:20px}
.ranking{
  background:rgba(0,0,0,.25);
  border-radius:18px;
  padding:16px;
}
</style>
</head>

<body>

<header>
  <h1>🏐 Fanta Splash Volley</h1>
</header>

<main>

<div class="sound-box">
  <button class="btn" onclick="toggleSound()" id="soundBtn">🔊 Suono ON</button>
</div>

<div class="section-title">🏆 Classifica</div>
<div class="ranking" id="ranking"></div>

<div class="section-title">📷 Squadre</div>
<button class="btn" onclick="addTeam()">➕ Aggiungi squadra</button>

<div id="teams"></div>

</main>

<script>
/* STORAGE */
const DB_KEY="fsv_complete";
const SOUND_KEY="fsv_sound";
const VOTE_KEY="fsv_votes";

/* SOUND */
let soundEnabled = localStorage.getItem(SOUND_KEY)!=="off";
const voteSound = new Audio("data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEAIlYAAESsAAACABAAZGF0YQAAAAA=");
voteSound.volume=0.35;

/* DATA */
let data = JSON.parse(localStorage.getItem(DB_KEY)) || { teams: [] };
let votes = JSON.parse(localStorage.getItem(VOTE_KEY)) || {};

function save(){
  localStorage.setItem(DB_KEY, JSON.stringify(data));
  localStorage.setItem(VOTE_KEY, JSON.stringify(votes));
}

/* SOUND */
function toggleSound(){
  soundEnabled=!soundEnabled;
  localStorage.setItem(SOUND_KEY,soundEnabled?"on":"off");
  updateSoundBtn();
}
function updateSoundBtn(){
  document.getElementById("soundBtn").textContent =
   soundEnabled ? "🔊 Suono ON" : "🔇 Suono OFF";
}

/* TEAM */
function addTeam(){
  const name = prompt("Nome squadra:");
  if(!name) return;
  data.teams.push({ id:Date.now(), name, media:[] });
  save(); render();
}

/* MEDIA */
function uploadMedia(teamId,type,input){
  const file = input.files[0];
  if(!file) return;

  const reader = new FileReader();
  reader.onload = e=>{
    const team = data.teams.find(t=>t.id===teamId);
    team.media.push({
      id:Date.now(),
      type,
      src:e.target.result,
      total:0,
      count:0
    });
    save(); render();
  };
  reader.readAsDataURL(file);
  input.value="";
}

function deleteMedia(teamId,mediaId){
  const team = data.teams.find(t=>t.id===teamId);
  team.media = team.media.filter(m=>m.id!==mediaId);
  save(); render();
}

/* VOTE */
function vote(mediaId,value){
  if(votes[mediaId]) return alert("Hai già votato!");
  votes[mediaId]=value;
  data.teams.forEach(t=>t.media.forEach(m=>{
    if(m.id===mediaId){
      m.total+=value;
      m.count++;
    }
  }));
  if(soundEnabled){
    voteSound.currentTime=0;
    voteSound.play().catch(()=>{});
  }
  alert("🙏 GRAZIE PER AVER VOTATO!");
  save(); render();
}

/* SCORE */
function teamScore(t){
  let tot=0, cnt=0;
  t.media.forEach(m=>{
    tot+=m.total;
    cnt+=m.count;
  });
  return cnt? (tot/cnt).toFixed(2):'0.00';
}

/* RENDER */
function render(){
  const teamsEl=document.getElementById("teams");
  teamsEl.innerHTML="";

  const ranking=[...data.teams].sort((a,b)=>teamScore(b)-teamScore(a));
  const winnerId = ranking[0]?.id;

  document.getElementById("ranking").innerHTML =
    ranking.map((t,i)=>`<div>${i+1}. ${t.name} – ⭐ ${teamScore(t)}</div>`).join("");

  data.teams.forEach(t=>{
    teamsEl.innerHTML+=`
      <div class="team ${t.id===winnerId?'winner':''}">
        <h3>${t.name}</h3>

        <input type="file" accept="image/*" onchange="uploadMedia(${t.id},'photo',this)">
        <input type="file" accept="video/*" onchange="uploadMedia(${t.id},'video',this)">

        ${t.media.map(m=>{
          const avg = m.count ? (m.total/m.count).toFixed(1) : '—';
          const voted = votes[m.id];
          return `
          <div class="media">
            ${m.type==="photo"
              ? `<img src="${m.src}      : `${m.src}</video>`}
            <div>Media voto: ⭐ ${avg}</div>
            ${voted
              ? `<div>✅ Hai votato: ${voted}/10</div>`
              : `<div class="stars">${
                Array.from({length:10},(_,i)=>`
                  <button onclick="vote(${m.id},${i+1})">${i<5?'⭐':'🌟'}</button>
                `).join('')
              }</div>`
            }
            <button class="delete-btn" onclick="deleteMedia(${t.id},${m.id})">🗑️ Elimina</button>
          </div>`;
        }).join("")}
      </div>
    `;
  });
}

updateSoundBtn();
render();
</script>

</body>
</html>
